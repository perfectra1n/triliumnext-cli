name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: bun run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: bun run test -- --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: bun install
      - run: bun run build

      - name: Verify bundle exists
        run: test -f dist/main.js

      - name: Verify shebang
        run: head -1 dist/main.js | grep -q '#!/usr/bin/env node'

      - name: Smoke test (node)
        run: node dist/main.js --help

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: bun install
      - run: bun run build

      - name: Pull Trilium image
        run: docker pull triliumnext/trilium:latest

      - name: Run integration tests
        run: bun run test:integration -- --reporter=verbose
        timeout-minutes: 5
